<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#001020">
    <title>Ocean Waves</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Fixed ocean background -->
    <canvas id="simulator"></canvas>
    <div id="sky"></div>

    <!-- Sticky header -->
    <div id="hero-top">
        <div id="logo">
            <svg width="82" height="36" viewBox="0 0 82 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                <mask id="mask0_1_9" style="mask-type:luminance" maskUnits="userSpaceOnUse" x="0" y="0" width="82" height="36">
                    <path d="M81.7817 35.1803H0V0H81.7817V35.1803Z" fill="white"/>
                </mask>
                <g mask="url(#mask0_1_9)">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M50.5773 23.8942L52.5673 20.9105L33.3227 20.9092L35.3158 17.9242L14.6112 17.9216L17.3827 13.7646L19.038 11.2843L36.6425 11.2857L34.6479 14.272L53.894 14.2733L51.904 17.257L74.2564 17.2583H77.1324L72.707 23.8955L50.5773 23.8942ZM77.1324 26.2185L72.707 32.8571H44.6011L46.5912 29.8734L27.3465 29.8721L29.3396 26.8858L8.6335 26.8845L10.6932 23.7946L13.0619 20.2459L30.6663 20.2472L28.6732 23.2322L47.9179 23.2335L45.9278 26.2172L74.2564 26.2185H77.1324ZM59.8748 5.30648L57.8802 8.29803H77.1324L72.707 14.934L56.5535 14.9327L58.545 11.9503L39.3019 11.949L41.295 8.96136L20.5874 8.96005L25.0142 2.32279H42.6217L40.6301 5.30779L59.8748 5.30648ZM75.8057 14.9353L81.7819 5.97375H62.5312L64.5242 2.9835L45.2796 2.98481L47.2712 -0.00149536H23.4649L17.4872 8.96005L11.511 17.9216H11.5095L10.8901 18.8524L9.96171 20.2446L8.97577 21.722L-0.000610352 35.1801L3.09955 35.1774L7.08266 29.2088L24.6886 29.2101L22.6955 32.1951L41.9417 32.1964L39.9501 35.1801H74.2564L81.7819 23.8955H75.8057L81.7819 14.9353H75.8057Z" fill="white"/>
                </g>
            </svg>
        </div>
        <div id="hero-location">
            <div id="location-row">
                <h1 id="location-name">Loading...</h1>
                <a id="location-map" href="map.html" aria-label="Open map">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                </a>
            </div>
            <span id="location-coords"></span>
        </div>
    </div>

    <!-- Scrollable content -->
    <div id="scroll-wrap">

        <!-- Hero: 100vh transparent spacer over the animation -->
        <section id="hero">
            <div id="hero-bottom">
                <div id="weather-condition">
                    <span id="condition-icon"></span>
                    <span id="condition-text">--</span>
                </div>
                <div id="sea-state-label" class="hero-sea-state">--</div>
                <div id="hud-stats">
                    <div class="hud-stat">
                        <div class="hud-accent"></div>
                        <div class="hud-stat-content">
                            <span class="hud-label">HEIGHT</span>
                            <span class="hud-value" id="wave-height">--</span>
                        </div>
                    </div>
                    <div class="hud-stat">
                        <div class="hud-accent"></div>
                        <div class="hud-stat-content">
                            <span class="hud-label">PERIOD</span>
                            <span class="hud-value" id="wave-period">--</span>
                        </div>
                    </div>
                    <div class="hud-stat">
                        <div class="hud-accent"></div>
                        <div class="hud-stat-content">
                            <span class="hud-label">WIND</span>
                            <span class="hud-value" id="wind-speed">--</span>
                        </div>
                    </div>
                    <div class="hud-stat">
                        <div class="hud-accent"></div>
                        <div class="hud-stat-content">
                            <span class="hud-label">GUST</span>
                            <span class="hud-value" id="wind-gust">--</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Cards section -->
        <div id="cards-bg">
        <section id="cards-section">
            <div class="data-card" id="card-temp" style="--delay: 0">
                <div class="card-carousel">
                    <div class="card-slide card-current">
                        <div class="card-pill pill-temp">
                            <span class="pill-value" id="card-temp-val">--</span>
                            <span class="pill-unit">&deg;F</span>
                        </div>
                        <div class="card-info">
                            <div class="card-info-label">SEA TEMP</div>
                            <div class="card-info-detail" id="card-temp-detail">--</div>
                            <div class="card-chart-row">
                                <div class="card-bars" id="bars-temp"></div>
                                <div class="card-trend" id="trend-temp"></div>
                            </div>
                        </div>
                    </div>
                    <div class="card-slide card-forecast" id="forecast-temp"></div>
                </div>
            </div>

            <div class="data-card" id="card-wind" style="--delay: 1">
                <div class="card-carousel">
                    <div class="card-slide card-current">
                        <div class="card-pill pill-wind">
                            <span class="pill-value" id="card-wind-val">--</span>
                            <span class="pill-unit">MPH</span>
                        </div>
                        <div class="card-info">
                            <div class="card-info-label">WIND</div>
                            <div class="card-info-detail" id="card-wind-dir">--</div>
                            <div class="card-chart-row">
                                <div class="card-bars" id="bars-wind"></div>
                                <div class="card-trend" id="trend-wind"></div>
                            </div>
                        </div>
                    </div>
                    <div class="card-slide card-forecast" id="forecast-wind"></div>
                </div>
            </div>

            <div class="data-card" id="card-swell" style="--delay: 2">
                <div class="card-carousel">
                    <div class="card-slide card-current">
                        <div class="card-pill pill-swell">
                            <span class="pill-value" id="card-swell-val">--</span>
                            <span class="pill-unit">FT</span>
                        </div>
                        <div class="card-info">
                            <div class="card-info-label">SWELL</div>
                            <div class="card-info-detail" id="card-swell-dir">--</div>
                            <div class="card-chart-row">
                                <div class="card-bars" id="bars-swell"></div>
                                <div class="card-trend" id="trend-swell"></div>
                            </div>
                        </div>
                    </div>
                    <div class="card-slide card-forecast" id="forecast-swell"></div>
                </div>
            </div>

            <div class="data-card" id="card-period" style="--delay: 3">
                <div class="card-carousel">
                    <div class="card-slide card-current">
                        <div class="card-pill pill-period">
                            <span class="pill-value" id="card-period-val">--</span>
                            <span class="pill-unit">S</span>
                        </div>
                        <div class="card-info">
                            <div class="card-info-label">PERIOD</div>
                            <div class="card-info-detail" id="card-period-detail">--</div>
                            <div class="card-chart-row">
                                <div class="card-bars" id="bars-period"></div>
                                <div class="card-trend" id="trend-period"></div>
                            </div>
                        </div>
                    </div>
                    <div class="card-slide card-forecast" id="forecast-period"></div>
                </div>
            </div>

            <div class="data-card" id="card-tide" style="--delay: 4">
                <div class="card-pill pill-tide">
                    <span class="pill-value" id="card-tide-val">--</span>
                    <span class="pill-unit">FT</span>
                </div>
                <div class="tide-gauge" id="tide-gauge">
                    <span class="tide-time" id="tide-time-top">--:--</span>
                    <div class="tide-track">
                        <div class="tide-indicator" id="tide-indicator">
                            <div class="tide-dot"></div>
                            <svg class="tide-arrow" width="8" height="6" viewBox="0 0 8 6" fill="none">
                                <path d="M4 6L0 0h8L4 6z" fill="currentColor"/>
                            </svg>
                        </div>
                    </div>
                    <span class="tide-time" id="tide-time-bottom">--:--</span>
                </div>
                <div class="card-info">
                    <div class="card-info-label">TIDE</div>
                    <div class="card-info-detail" id="card-tide-state">--</div>
                </div>
            </div>
        </section>
        </div>

        <!-- Footer -->
        <footer id="site-footer">
            <button id="admin-toggle" aria-label="Settings">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
        </footer>
    </div>

    <!-- Admin tuning panel -->
    <div id="admin-panel">
        <div id="admin-header">
            <span>Tuning Panel</span>
            <button id="admin-close">&times;</button>
        </div>
        <div id="admin-body">
            <div class="admin-section">
                <div class="admin-section-title">Wind (Speed + Direction)</div>
                <label>Speed (m/s) <span id="val-windspeed">10</span></label>
                <input type="range" id="slider-windspeed" min="0" max="30" step="0.5" value="10">
                <label>Direction (&deg;) <span id="val-winddir">225</span></label>
                <input type="range" id="slider-winddir" min="0" max="360" step="1" value="225">
            </div>
            <div class="admin-section">
                <div class="admin-section-title">Direct Components</div>
                <label>Wind X <span id="val-windx">10</span></label>
                <input type="range" id="slider-windx" min="-25" max="25" step="0.5" value="10">
                <label>Wind Y <span id="val-windy">10</span></label>
                <input type="range" id="slider-windy" min="-25" max="25" step="0.5" value="10">
            </div>
            <div class="admin-section">
                <div class="admin-section-title">Camera</div>
                <label>Elevation <span id="val-elevation">0.66</span></label>
                <input type="range" id="slider-elevation" min="0.2" max="0.8" step="0.01" value="0.66">
            </div>
            <div class="admin-section">
                <div class="admin-section-title">Simulation</div>
                <label>Size <span id="val-size">250</span></label>
                <input type="range" id="slider-size" min="100" max="1000" step="10" value="250">
                <label>Choppiness <span id="val-chop">1.5</span></label>
                <input type="range" id="slider-chop" min="0" max="2.5" step="0.05" value="1.5">
            </div>
            <div class="admin-section">
                <div class="admin-section-title">Presets</div>
                <div id="admin-presets">
                    <button class="preset-btn" data-preset="calm">Calm</button>
                    <button class="preset-btn" data-preset="moderate">Moderate</button>
                    <button class="preset-btn" data-preset="stormy">Stormy</button>
                    <button class="preset-btn" data-preset="hurricane">Hurricane</button>
                </div>
            </div>
            <div class="admin-actions">
                <button id="btn-copy-params">Copy Params</button>
                <button id="btn-resume-weather">Resume Weather</button>
            </div>
        </div>
    </div>

    <div id="loading">
        <div id="loading-text">Loading ocean...</div>
    </div>

    <script src="shared.js"></script>
    <script src="simulation.js"></script>
    <script src="weather.js"></script>
    <script src="app.js"></script>
</body>
</html>
