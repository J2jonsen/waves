<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#001020">
    <title>Ocean Waves</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Fixed ocean background -->
    <canvas id="simulator"></canvas>
    <div id="sky"></div>

    <!-- Scrollable content -->
    <div id="scroll-wrap">

        <!-- Hero: 100vh transparent spacer over the animation -->
        <section id="hero">
            <div id="hero-top">
                <div id="hero-location">
                    <div id="location-row">
                        <h1 id="location-name">Loading...</h1>
                        <button id="location-next" aria-label="Next location">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                        </button>
                    </div>
                    <span id="location-coords"></span>
                </div>
                <div id="hero-actions">
                    <button id="admin-toggle" aria-label="Toggle tuning panel">&#9881;</button>
                </div>
            </div>

            <div id="hero-bottom">
                <div id="sea-state-label" class="hero-sea-state">--</div>
                <div id="hud-stats">
                    <div class="hud-stat">
                        <span class="hud-label">Wind</span>
                        <span class="hud-value" id="wind-speed">--</span>
                    </div>
                    <div class="hud-stat">
                        <span class="hud-label">SST</span>
                        <span class="hud-value" id="sst-value">--</span>
                    </div>
                    <div class="hud-stat">
                        <span class="hud-label">Height</span>
                        <span class="hud-value" id="wave-height">--</span>
                    </div>
                    <div class="hud-stat">
                        <span class="hud-label">Period</span>
                        <span class="hud-value" id="wave-period">--</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Cards section -->
        <div id="cards-bg">
        <section id="cards-section">
            <div class="data-card" id="card-wind" style="--delay: 0">
                <div class="card-pill pill-wind">
                    <span class="pill-value" id="card-wind-val">--</span>
                    <span class="pill-unit">MPH</span>
                </div>
                <div class="card-info">
                    <div class="card-info-label">WIND</div>
                    <div class="card-info-detail" id="card-wind-dir">--</div>
                    <svg class="spark" id="spark-wind" viewBox="0 0 120 32" preserveAspectRatio="none"></svg>
                </div>
            </div>

            <div class="data-card" id="card-height" style="--delay: 1">
                <div class="card-pill pill-height">
                    <span class="pill-value" id="card-height-val">--</span>
                    <span class="pill-unit">FT</span>
                </div>
                <div class="card-info">
                    <div class="card-info-label" id="card-height-dir">WAVE HEIGHT</div>
                    <div class="card-info-detail" id="card-height-detail">--</div>
                    <svg class="spark" id="spark-height" viewBox="0 0 120 32" preserveAspectRatio="none"></svg>
                </div>
            </div>

            <div class="data-card" id="card-period" style="--delay: 2">
                <div class="card-pill pill-period">
                    <span class="pill-value" id="card-period-val">--</span>
                    <span class="pill-unit">S</span>
                </div>
                <div class="card-info">
                    <div class="card-info-label">WAVE PERIOD</div>
                    <div class="card-info-detail" id="card-period-detail">--</div>
                    <svg class="spark" id="spark-period" viewBox="0 0 120 32" preserveAspectRatio="none"></svg>
                </div>
            </div>

            <div class="data-card" id="card-sst" style="--delay: 3">
                <div class="card-pill pill-sst">
                    <span class="pill-value" id="card-sst-val">--</span>
                    <span class="pill-unit">&deg;F</span>
                </div>
                <div class="card-info">
                    <div class="card-info-label">SEA SURFACE TEMP</div>
                    <div class="card-info-detail" id="card-sst-detail">--</div>
                    <svg class="spark" id="spark-sst" viewBox="0 0 120 32" preserveAspectRatio="none"></svg>
                </div>
            </div>
        </section>
        </div>
    </div>

    <!-- Admin tuning panel -->
    <div id="admin-panel">
        <div id="admin-header">
            <span>Tuning Panel</span>
            <button id="admin-close">&times;</button>
        </div>
        <div id="admin-body">
            <div class="admin-section">
                <div class="admin-section-title">Wind (Speed + Direction)</div>
                <label>Speed (m/s) <span id="val-windspeed">10</span></label>
                <input type="range" id="slider-windspeed" min="0" max="30" step="0.5" value="10">
                <label>Direction (&deg;) <span id="val-winddir">225</span></label>
                <input type="range" id="slider-winddir" min="0" max="360" step="1" value="225">
            </div>
            <div class="admin-section">
                <div class="admin-section-title">Direct Components</div>
                <label>Wind X <span id="val-windx">10</span></label>
                <input type="range" id="slider-windx" min="-25" max="25" step="0.5" value="10">
                <label>Wind Y <span id="val-windy">10</span></label>
                <input type="range" id="slider-windy" min="-25" max="25" step="0.5" value="10">
            </div>
            <div class="admin-section">
                <div class="admin-section-title">Simulation</div>
                <label>Size <span id="val-size">250</span></label>
                <input type="range" id="slider-size" min="100" max="1000" step="10" value="250">
                <label>Choppiness <span id="val-chop">1.5</span></label>
                <input type="range" id="slider-chop" min="0" max="2.5" step="0.05" value="1.5">
            </div>
            <div class="admin-section">
                <div class="admin-section-title">Presets</div>
                <div id="admin-presets">
                    <button class="preset-btn" data-preset="calm">Calm</button>
                    <button class="preset-btn" data-preset="moderate">Moderate</button>
                    <button class="preset-btn" data-preset="stormy">Stormy</button>
                    <button class="preset-btn" data-preset="hurricane">Hurricane</button>
                </div>
            </div>
            <div class="admin-actions">
                <button id="btn-copy-params">Copy Params</button>
                <button id="btn-resume-weather">Resume Weather</button>
            </div>
        </div>
    </div>

    <div id="loading">
        <div id="loading-text">Loading ocean...</div>
    </div>

    <script src="shared.js"></script>
    <script src="simulation.js"></script>
    <script src="weather.js"></script>
    <script src="app.js"></script>
</body>
</html>
