<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#001020">
    <title>Ocean Data</title>
    <link rel="stylesheet" href="data.css">
</head>
<body>
    <nav id="nav">
        <a href="index.html" id="nav-back">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            Ocean View
        </a>
    </nav>

    <header id="header">
        <h1 id="location-name">Loading...</h1>
        <p id="updated-at">Fetching data...</p>
    </header>

    <div id="location-bar">
        <select id="location-select"></select>
    </div>

    <main id="cards-grid">
        <div class="card" id="card-sst" style="--delay: 0">
            <div class="card-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/>
                </svg>
            </div>
            <div class="card-label">Sea Surface Temp</div>
            <div class="card-value" id="val-sst">--</div>
            <div class="card-unit" id="unit-sst">&deg;C</div>
            <button class="card-toggle" id="toggle-sst">Switch to &deg;F</button>
        </div>

        <div class="card" id="card-height" style="--delay: 1">
            <div class="card-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 12c1.5-3 4-5 6-5s4.5 2 6 5c1.5 3 4 5 6 5"/>
                    <path d="M2 17c1.5-3 4-5 6-5s4.5 2 6 5c1.5 3 4 5 6 5"/>
                </svg>
            </div>
            <div class="card-label">Wave Height</div>
            <div class="card-value" id="val-height">--</div>
            <div class="card-unit" id="unit-height">m</div>
            <button class="card-toggle" id="toggle-height">Switch to ft</button>
        </div>

        <div class="card" id="card-direction" style="--delay: 2">
            <div class="card-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 2v4"/>
                    <path d="M12 18v4"/>
                    <path d="M2 12h4"/>
                    <path d="M18 12h4"/>
                    <path id="compass-arrow" d="M12 8l-3 8 3-2 3 2z" fill="currentColor"/>
                </svg>
            </div>
            <div class="card-label">Wave Direction</div>
            <div class="card-value" id="val-direction">--</div>
            <div class="card-unit" id="unit-direction">&deg;</div>
            <div class="card-sub" id="sub-direction"></div>
        </div>

        <div class="card" id="card-period" style="--delay: 3">
            <div class="card-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
            </div>
            <div class="card-label">Wave Period</div>
            <div class="card-value" id="val-period">--</div>
            <div class="card-unit">seconds</div>
            <div class="card-sub" id="sub-period"></div>
        </div>
    </main>

    <script src="weather.js"></script>
    <script src="data.js"></script>
</body>
</html>
